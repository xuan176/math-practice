<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>云上彝算 · 沉浸刷题</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: url('images/cursor.png') 0 0, auto;
        }

        body {
            background: url('images/bg.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, '华文楷书', 'Microsoft YaHei', sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            pointer-events: none;
            z-index: 0;
        }

        .quiz-container {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 254, 247, 0.94);
            backdrop-filter: blur(3px);
            border-radius: 3rem;
            box-shadow: 0 20px 35px rgba(100, 50, 10, 0.3);
            overflow: hidden;
            border: 1px solid #ffd89a;
            position: relative;
            z-index: 1;
        }

        .hero {
            background: #8b2c1d;
            background-image: radial-gradient(circle at 10% 30%, rgba(255,215,130,0.15) 2%, transparent 2.5%);
            background-size: 28px 28px;
            padding: 1.2rem 1.5rem;
            text-align: center;
            color: #ffefcf;
        }

        .hero h1 {
            font-size: 1.9rem;
            letter-spacing: 2px;
            font-weight: 700;
            text-shadow: 2px 2px 0 #5a1e12;
        }

        .sub {
            font-size: 0.85rem;
            margin-top: 8px;
            opacity: 0.9;
        }

        .filter-bar {
            background: rgba(251, 230, 194, 0.85);
            padding: 1rem 1.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid #e7c494;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-weight: 600;
            color: #743f2c;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        select {
            background: white;
            border: 1px solid #d4a373;
            padding: 8px 28px 8px 12px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            color: #4a2c1c;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }

        .progress-area {
            background: rgba(255, 244, 230, 0.9);
            padding: 0.8rem 1.8rem;
            border-bottom: 1px solid #eedbba;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .badge {
            background: #e0c8a8;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #5e2e1c;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            background: #f0dbc0;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            transition: 0.2s;
            font-size: 0.8rem;
            color: #7b3f28;
        }

        .nav-btn:hover {
            background: #e2c49c;
            transform: scale(0.96);
        }

        .question-card {
            padding: 2rem 1.8rem 1.8rem;
        }

        .scenario {
            background: #fdf3e2;
            padding: 1rem 1.2rem;
            border-radius: 2rem;
            border-left: 8px solid #d9894a;
            margin-bottom: 1.5rem;
            font-size: 0.98rem;
            color: #4c3a2b;
            line-height: 1.4;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2f2218;
            margin: 1rem 0 1rem 0;
            background: #fff0df;
            padding: 0.8rem 1rem;
            border-radius: 2rem;
            line-height: 1.4;
        }

        .illustration-img {
            margin: 0.8rem 0 1.2rem 0;
            text-align: center;
            background: #faf3e8;
            border-radius: 28px;
            padding: 12px;
            border: 1px solid #f0ddc0;
        }
        .illustration-img img {
            max-width: 100%;
            max-height: 240px;
            border-radius: 20px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
        }
        .img-fallback {
            color: #b48a5c;
            font-size: 0.8rem;
            padding: 16px;
            background: #f4e9db;
            border-radius: 24px;
            font-style: italic;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0 20px;
        }

        .option {
            background: #fdf8f0;
            border: 1px solid #f0dbbd;
            border-radius: 60px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.15s;
        }

        .option:hover {
            background: #f9efdf;
            border-color: #cd9f6e;
            transform: translateX(5px);
        }

        .option.selected {
            background: #ffedd5;
            border-color: #e68a2e;
            box-shadow: 0 2px 8px rgba(230, 138, 46, 0.2);
        }

        .option-prefix {
            font-weight: 800;
            font-size: 1.2rem;
            width: 36px;
            height: 36px;
            background: #f3e1ca;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #b45a2c;
        }

        .option-text {
            font-size: 1rem;
            font-weight: 500;
            color: #3b2a1f;
        }

        .action-btn {
            background: #e7974c;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            margin-top: 10px;
            transition: 0.2s;
            box-shadow: 0 4px 0 #9b521f;
        }

        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #9b521f;
        }

        .feedback {
            margin-top: 18px;
            text-align: center;
            font-weight: 500;
            padding: 8px;
            border-radius: 40px;
            background: #f5ede2;
            color: #876b4b;
        }

        .feedback.error {
            color: #c23b22;
            background: #ffe8e3;
        }

        .feedback.success {
            color: #2a6b2f;
            background: #e5f6e5;
        }

        footer {
            background: rgba(250, 230, 206, 0.9);
            text-align: center;
            padding: 12px;
            font-size: 0.7rem;
            color: #aa7b54;
            border-top: 1px solid #eedbba;
        }

        .completion-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .completion-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .completion-card {
            background: #fffaf2;
            max-width: 380px;
            width: 85%;
            border-radius: 48px;
            text-align: center;
            padding: 2rem 1.8rem;
            box-shadow: 0 30px 40px rgba(60, 30, 10, 0.4);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
        }
        .completion-overlay.active .completion-card {
            transform: scale(1);
        }
        .completion-card h2 {
            font-size: 2rem;
            color: #b45f2b;
            margin-bottom: 0.5rem;
        }
        .completion-card p {
            font-size: 1.1rem;
            margin: 1rem 0;
            color: #4a2c1c;
        }
        .completion-card button {
            background: #e7974c;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 40px;
            color: white;
            margin-top: 8px;
        }
        @media (max-width: 550px) {
            body { padding: 0.8rem; }
            .question-text { font-size: 1.1rem; }
            .illustration-img img { max-height: 180px; }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <div class="hero">
        <h1>🔥 云上彝算 🔥</h1>
        <div class="sub">✨ 火塘边的算术 · 纹样里的几何 ✨</div>
    </div>
    <div class="filter-bar">
        <div class="filter-group">
            <label>📚 年级</label>
            <select id="gradeSelect">
                <option value="1">一年级</option><option value="2">二年级</option><option value="3">三年级</option>
                <option value="4">四年级</option><option value="5">五年级</option><option value="6">六年级</option>
            </select>
        </div>
        <div class="filter-group">
            <label>🏷️ 科目</label>
            <select id="categorySelect">
                <option value="arithmetic">📖 算数大闯关</option>
                <option value="geometry">📐 图形趣探索</option>
            </select>
        </div>
    </div>
    <div class="progress-area">
        <span class="badge" id="progressText">第1 / 0题</span>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn">◀ 上一题</button>
            <button class="nav-btn" id="resetCategoryBtn">🔄 重置本类</button>
        </div>
    </div>
    <div class="question-card">
        <div class="scenario" id="scenarioArea">加载题目情境...</div>
        <div class="question-text" id="questionText"></div>
        <div id="imageContainer" class="illustration-img"></div>
        <div class="options" id="optionsContainer"></div>
        <button class="action-btn" id="submitBtn">🔥 提交答案 · 答对跳转 🔥</button>
        <div class="feedback" id="feedbackMsg"></div>
    </div>
    <footer>🎋 每道题配有专属插图（images/image1.png ~ image72.png），答对自动跳转，答错仅提示错误 🎋</footer>
</div>
<div id="completionModal" class="completion-overlay">
    <div class="completion-card">
        <h2>🎉 太棒啦！ 🎉</h2>
        <p>你完成了当前所有题目！<br>可以切换年级或类别继续挑战~</p>
        <button id="closeModalBtn">✨ 继续探索 ✨</button>
    </div>
</div>

<script>
    // ----------------------------- 音频控制（自动播放，音量0.8） -----------------------------
    let bgAudio = null;
    let correctAudio = null;
    let wrongAudio = null;

    function initAudio() {
        bgAudio = new Audio('audio/background.mp3');
        bgAudio.loop = true;
        bgAudio.volume = 0.8;
        bgAudio.play().catch(e => {
            const playOnClick = () => {
                bgAudio.play().catch(err => console.log("背景音乐无法自动播放"));
                document.body.removeEventListener('click', playOnClick);
            };
            document.body.addEventListener('click', playOnClick);
        });
        correctAudio = new Audio('audio/correct.mp3');
        wrongAudio = new Audio('audio/wrong.mp3');
    }

    function playCorrect() {
        if (correctAudio) correctAudio.play().catch(e => console.log('音效播放失败'));
    }
    function playWrong() {
        if (wrongAudio) wrongAudio.play().catch(e => console.log('音效播放失败'));
    }

    // ----------------------------- 72道题目（图片自动按顺序 image1.png ~ image72.png） -----------------------------
    const QUESTION_SET = [];

    function addItem(grade, category, scenario, question, options, correct) {
        const newId = QUESTION_SET.length + 1;
        const imagePath = `images/image${newId}.png`;   // 按顺序自动匹配图片
        QUESTION_SET.push({
            id: newId,
            grade: grade,
            category: category,
            scenario: scenario,
            question: question,
            options: options,
            correct: correct,
            imageSrc: imagePath
        });
    }

    function opt(letter, text) { return { letter, text }; }

    // ===================== 一年级（12题） =====================
    // 一年级·数与代数（彝家集市）
    addItem(1, 'arithmetic', '彝家集市', '集市上有3只羊，阿爸又牵来2只，现在一共有几只羊？', [opt('A','3'),opt('B','5'),opt('C','4'),opt('D','2')], 'B');
    addItem(1, 'arithmetic', '彝家集市', '阿表哥买了4根火把，点着了1根，还剩几根没点着？', [opt('A','5'),opt('B','2'),opt('C','3'),opt('D','6')], 'C');
    addItem(1, 'arithmetic', '彝家集市', '集市上有2只公鸡和3只母鸡，公鸡多还是母鸡多？多几只？', [opt('A','公鸡多，多1只'),opt('B','母鸡多，多1只'),opt('C','母鸡多，多2只'),opt('D','一样多')], 'B');
    // 一年级·数与代数（火把节广场）
    addItem(1, 'arithmetic', '火把节广场', '火把节广场上插了2根大火把，又插了3根小火把，一共有几根火把？', [opt('A','4'),opt('B','3'),opt('C','2'),opt('D','5')], 'D');
    addItem(1, 'arithmetic', '火把节广场', '广场上有5个人跳左脚舞，走了2个人去喝水，还剩几个人在跳？', [opt('A','3'),opt('B','2'),opt('C','4'),opt('D','7')], 'A');
    addItem(1, 'arithmetic', '火把节广场', '广场上的松茸摊左边有1堆松茸，右边有4堆松茸，哪边多？多几堆？', [opt('A','左边多，多3堆'),opt('B','右边多，多4堆'),opt('C','右边多，多3堆'),opt('D','两边一样多')], 'C');
    // 一年级·图形与几何（彝家集市）
    addItem(1, 'geometry', '彝家集市', '集市上有一个装荞麦的长方体木箱，它像数学课上学过的什么形状？', [opt('A','圆柱'),opt('B','正方体'),opt('C','球'),opt('D','长方体')], 'D');
    addItem(1, 'geometry', '彝家集市', '集市上卖的火把，一根根圆圆的，像什么形状？', [opt('A','长方体'),opt('B','圆柱'),opt('C','正方体'),opt('D','球')], 'B');
    addItem(1, 'geometry', '彝家集市', '阿妈买了一个装松茸的篮子，篮子是什么形状的？它和皮球有什么不同？', [opt('A','正方体，都能滚动'),opt('B','球，都不能随意滚动'),opt('C','长方体，篮子不能自由滚动，皮球可以滚动'),opt('D','圆柱，都能随意滚动')], 'C');
    // 一年级·图形与几何（火把节广场）
    addItem(1, 'geometry', '火把节广场', '火把节广场上立着一根高高的火把柱，它像什么形状？', [opt('A','长方体'),opt('B','球'),opt('C','正方体'),opt('D','圆柱')], 'D');
    addItem(1, 'geometry', '火把节广场', '广场上有一个像盒子一样的祭台，它是什么形状的？', [opt('A','圆柱'),opt('B','长方体'),opt('C','球'),opt('D','圆锥')], 'B');
    addItem(1, 'geometry', '火把节广场', '广场上放着一个圆圆的羊皮鼓，它可以滚动吗？和装火把的木箱有什么不同？', [opt('A','不能滚动，和木箱特征相同'),opt('B','可以滚动，木箱也能随意滚动'),opt('C','可以滚动，木箱不能自由滚动'),opt('D','不能滚动，木箱可以滚动')], 'C');

    // ===================== 二年级（12题） =====================
    // 二年级·数与代数（彝家集市）
    addItem(2, 'arithmetic', '彝家集市', '集市上阿表哥买了23根火把，每个房间放5根，可以放满几个房间？还剩几根？', [opt('A','5间剩3根'),opt('B','4间剩3根'),opt('C','3间剩8根'),opt('D','4间剩7根')], 'B');
    addItem(2, 'arithmetic', '彝家集市', '阿妈买了17个荞饼，每袋装5个，可以装满几袋？还剩几个？', [opt('A','4袋剩1个'),opt('B','2袋剩7个'),opt('C','3袋剩2个'),opt('D','3袋剩3个')], 'C');
    addItem(2, 'arithmetic', '彝家集市', '彝家集市上有47位客人要坐桌子吃饭，每桌坐6人，最少需要准备多少张桌子？', [opt('A','7张'),opt('B','8张'),opt('C','9张'),opt('D','6张')], 'B');
    // 二年级·数与代数（火把节广场）
    addItem(2, 'arithmetic', '火把节广场', '阿表哥买了28根火把，每个寨门插6根，可以插满几个寨门？还剩几根？', [opt('A','5个剩2根'),opt('B','4个剩4根'),opt('C','3个剩10根'),opt('D','4个剩6根')], 'B');
    addItem(2, 'arithmetic', '火把节广场', '34块松茸，每袋装8块，能装满几袋？还剩几块？', [opt('A','3袋剩10块'),opt('B','5袋剩2块'),opt('C','4袋剩2块'),opt('D','4袋剩3块')], 'C');
    addItem(2, 'arithmetic', '火把节广场', '广场上有53位客人，每桌坐7人，最少需要准备多少张桌子才能让所有客人坐下？', [opt('A','7张'),opt('B','8张'),opt('C','9张'),opt('D','6张')], 'B');
    // 二年级·图形与几何（对称·彝家集市）
    addItem(2, 'geometry', '彝家集市', '集市上挂着一排彝族刺绣方巾，每一块方巾左右两边的花纹完全一样。这是数学课上学过的什么现象？', [opt('A','平移'),opt('B','对称'),opt('C','旋转'),opt('D','折叠')], 'B');
    addItem(2, 'geometry', '彝家集市', '集市上卖的民族剪纸，把纸对折后剪出的图案，打开后两边完全一样。这种剪纸方法叫什么？', [opt('A','平移裁剪'),opt('B','对称剪纸'),opt('C','旋转剪纸'),opt('D','拼接剪纸')], 'B');
    addItem(2, 'geometry', '彝家集市', '找出绣品对称图形，并说出它的对称轴在哪里。', [opt('A','对称轴在图形边缘'),opt('B','对称轴在图形正中间'),opt('C','没有对称轴'),opt('D','对称轴在图形外侧')], 'B');
    // 二年级·图形与几何（对称·火把节广场）
    addItem(2, 'geometry', '火把节广场', '火把节广场上的大门，左边和右边的装饰花纹完全对称。这是数学上的什么现象？', [opt('A','旋转'),opt('B','平移'),opt('C','对称'),opt('D','翻转')], 'C');
    addItem(2, 'geometry', '火把节广场', '广场上的火把排列，左边3根、右边3根，中间是通道。这个排列方式叫什么？', [opt('A','平移排布'),opt('B','对称排布'),opt('C','随机排布'),opt('D','旋转排布')], 'B');
    addItem(2, 'geometry', '火把节广场', '彝绣图案沿中间线对折两边重合，找出这条线并说出名称。', [opt('A','分割线'),opt('B','对称轴'),opt('C','边线'),opt('D','中线')], 'B');

    // ===================== 三年级（12题） =====================
    // 三年级·数与代数（彝家集市）
    addItem(3, 'arithmetic', '彝家集市', '集市上每根火把卖3元，阿表哥买了12根，一共要付多少钱？', [opt('A','32元'),opt('B','35元'),opt('C','36元'),opt('D','38元')], 'C');
    addItem(3, 'arithmetic', '彝家集市', '集市上每袋松茸卖8元，阿妈买了4袋，一共花了多少钱？', [opt('A','30元'),opt('B','32元'),opt('C','34元'),opt('D','36元')], 'B');
    addItem(3, 'arithmetic', '彝家集市', '彝家集市上每只羊卖125元，阿爸买了3只羊准备火把节用，一共要付多少钱？', [opt('A','365元'),opt('B','375元'),opt('C','385元'),opt('D','395元')], 'B');
    // 三年级·数与代数（火把节广场）
    addItem(3, 'arithmetic', '火把节广场', '火把节广场上要摆座位，每排放6把椅子，一共放18排，一共有多少把椅子？', [opt('A','108把'),opt('B','112把'),opt('C','116把'),opt('D','118把')], 'A');
    addItem(3, 'arithmetic', '火把节广场', '火把节每桌坐8个人，广场上摆了12桌，一共可以坐多少人？', [opt('A','66人'),opt('B','76人'),opt('C','86人'),opt('D','96人')], 'D');

    addItem(5, 'geometry', '火把节广场', '广场上有一个正方体的火把基座，棱长3米。这个基座的体积是多少立方米？', [opt('A','9'),opt('B','18'),opt('C','27'),opt('D','54')], 'C');
    addItem(5, 'geometry', '火把节广场', '广场上要搭建一个长方体松枝装饰架，长10米、宽6米、高3米。装饰架的表面积是多少平方米？', [opt('A','216'),opt('B','180'),opt('C','246'),opt('D','198')], 'A');

    // ===================== 六年级（12题） =====================
    // 六年级·数与代数（分数乘除）

    addItem(6, 'arithmetic', '彝家集市', '火把节用的松茸，阿表哥买了2/3千克，阿妈买的量是阿表哥的1/2。阿妈买了多少千克松茸？', [opt('A','1/2千克'),opt('B','1/3千克'),opt('C','2/5千克'),opt('D','3/4千克')], 'B');
    addItem(6, 'arithmetic', '火把节广场', '火把节广场上有60位客人，其中1/3是彝族，彝族客人有多少位？', [opt('A','15'),opt('B','20'),opt('C','30'),opt('D','40')], 'B');
    addItem(6, 'arithmetic', '火把节广场', '火把节烤了一只羊，阿表哥负责切肉，他切了整只羊的3/5。他切了多少只羊的肉？', [opt('A','3只'),opt('B','5只'),opt('C','3/5只'),opt('D','5/3只')], 'C');

    // 六年级·图形与几何（圆）
    addItem(6, 'geometry', '火把节广场', '火把节广场上有一个圆形的火把围圈，半径是5米。这个圈一圈有多长？', [opt('A','15.7米'),opt('B','31.4米'),opt('C','62.8米'),opt('D','78.5米')], 'B');
    addItem(6, 'geometry', '火把节广场', '广场上要铺一块圆形的松针地毯，半径是3米。这块地毯的面积是多少平方米？', [opt('A','9.42㎡'),opt('B','18.84㎡'),opt('C','28.26㎡'),opt('D','113.04㎡')], 'C');
    addItem(6, 'geometry', '火把节广场', '集市上有一个圆形的荞麦晒场，直径是20米。这个晒场的周长和面积各是多少？', [opt('A','周长31.4米，面积314㎡'),opt('B','周长62.8米，面积314㎡'),opt('C','周长62.8米，面积1256㎡'),opt('D','周长31.4米，面积1256㎡')], 'B');
    addItem(6, 'geometry', '火把节广场', '火把节广场上有一个圆形的火把围圈，半径是5米。这个圈一圈有多长？', [opt('A','15.7米'),opt('B','31.4米'),opt('C','62.8米'),opt('D','78.5米')], 'B');
    addItem(6, 'geometry', '火把节广场', '广场上要铺一块圆形的松针地毯，半径是3米。这块地毯的面积是多少平方米？', [opt('A','9.42㎡'),opt('B','18.84㎡'),opt('C','28.26㎡'),opt('D','113.04㎡')], 'C');
    addItem(6, 'geometry', '火把节广场', '火把节广场上中间的大火把围成一个圆形，直径是16米。这个圆圈的周长是多少米？面积是多少平方米？', [opt('A','周长25.12米，面积200.96㎡'),opt('B','周长50.24米，面积200.96㎡'),opt('C','周长50.24米，面积803.84㎡'),opt('D','周长25.12米，面积803.84㎡')], 'B');

    // ----------------------------- 刷题逻辑（错误不显示答案） -----------------------------
    let currentGrade = 1, currentCategory = 'arithmetic', currentList = [], currentIndex = 0;
    let selectedLetter = null, lockSubmit = false;
    const gradeSelect = document.getElementById('gradeSelect');
    const categorySelect = document.getElementById('categorySelect');
    const prevBtn = document.getElementById('prevBtn');
    const resetBtn = document.getElementById('resetCategoryBtn');
    const submitBtn = document.getElementById('submitBtn');
    const progressSpan = document.getElementById('progressText');
    const scenarioDiv = document.getElementById('scenarioArea');
    const questionDiv = document.getElementById('questionText');
    const optionsDiv = document.getElementById('optionsContainer');
    const feedbackDiv = document.getElementById('feedbackMsg');
    const imageContainer = document.getElementById('imageContainer');
    const modal = document.getElementById('completionModal');
    const closeModal = document.getElementById('closeModalBtn');

    function filterQuestions() {
        return QUESTION_SET.filter(q => q.grade === currentGrade && q.category === currentCategory).sort((a,b)=>a.id-b.id);
    }
    function refreshList() {
        currentList = filterQuestions();
        currentIndex = 0;
        selectedLetter = null;
        lockSubmit = false;
        renderCurrent();
        updateProgress();
        clearFeedback();
        modal.classList.remove('active');
        submitBtn.innerText = '🔥 提交答案 · 答对跳转 🔥';
    }
    function updateProgress() {
        progressSpan.innerText = currentList.length ? `第${currentIndex+1}/${currentList.length}题` : '0/0题';
    }
    function clearFeedback() {
        feedbackDiv.innerText = '✨ 选择答案，点击提交，答对自动前进 ✨';
        feedbackDiv.className = 'feedback';
    }
    function renderCurrent() {
        if(!currentList.length) {
            scenarioDiv.innerText = '暂无题目，请切换年级或类别';
            questionDiv.innerText = '—— 无题目数据 ——';
            optionsDiv.innerHTML = '<div class="option">暂无选项</div>';
            imageContainer.innerHTML = '<div class="img-fallback">📷 暂无配图</div>';
            return;
        }
        const q = currentList[currentIndex];
        scenarioDiv.innerText = q.scenario;
        questionDiv.innerText = q.question;
        imageContainer.innerHTML = '';
        if(q.imageSrc) {
            const img = document.createElement('img');
            img.src = q.imageSrc;
            img.alt = '插图';
            img.onerror = () => { imageContainer.innerHTML = `<div class="img-fallback">🏞️ 图片加载失败: ${q.imageSrc.split('/').pop()}</div>`; };
            imageContainer.appendChild(img);
        } else {
            imageContainer.innerHTML = '<div class="img-fallback">✨ 彝乡风物 · 想象画面 ✨</div>';
        }
        optionsDiv.innerHTML = '';
        q.options.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'option';
            if(selectedLetter === opt.letter) div.classList.add('selected');
            div.innerHTML = `<div class="option-prefix">${opt.letter}</div><div class="option-text">${opt.text}</div>`;
            div.onclick = () => {
                document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                selectedLetter = opt.letter;
                clearFeedback();
            };
            optionsDiv.appendChild(div);
        });
        lockSubmit = false;
    }
    function goToNext() {
        if(currentIndex + 1 < currentList.length) {
            currentIndex++;
            selectedLetter = null;
            renderCurrent();
            updateProgress();
            clearFeedback();
        } else {
            modal.classList.add('active');
            lockSubmit = true;
            submitBtn.innerText = '🎯 已完成！请切换或重置 🎯';
        }
    }
    function handleSubmit() {
        if(lockSubmit) {
            if(currentIndex === currentList.length-1 && currentList.length>0) modal.classList.add('active');
            else feedbackDiv.innerText = '🎊 请先切换年级/类别或点击「重置本类」继续刷题 🎊';
            return;
        }
        if(!currentList.length) { feedbackDiv.innerText = '📭 无题目，请调整筛选'; return; }
        if(!selectedLetter) { feedbackDiv.innerText = '❓ 请先选择一个答案！'; return; }
        const q = currentList[currentIndex];
        const isCorrect = (selectedLetter === q.correct);
        if(isCorrect) {
            playCorrect();
            feedbackDiv.innerText = '✅ 完全正确！跳转到下一题~';
            feedbackDiv.className = 'feedback success';
            lockSubmit = true;
            goToNext();
            setTimeout(() => {
                if(currentIndex < currentList.length) lockSubmit = false;
                else lockSubmit = true;
                if(currentIndex === currentList.length-1 && currentList.length>0) submitBtn.innerText = '🎯 已完成！请切换或重置 🎯';
                else submitBtn.innerText = '🔥 提交答案 · 答对跳转 🔥';
            }, 350);
        } else {
            playWrong();
            feedbackDiv.innerText = `❌ 再想想哦！`;
            feedbackDiv.className = 'feedback error';
        }
    }
    function prevQuestion() {
        if(!currentList.length) return;
        if(currentIndex > 0) {
            currentIndex--;
            selectedLetter = null;
            renderCurrent();
            updateProgress();
            clearFeedback();
            lockSubmit = false;
            submitBtn.innerText = '🔥 提交答案 · 答对跳转 🔥';
            modal.classList.remove('active');
        } else {
            feedbackDiv.innerText = '⛰️ 已经是第一题啦！';
            setTimeout(()=>clearFeedback(),1000);
        }
    }
    function resetCategory() {
        refreshList();
        selectedLetter = null;
        lockSubmit = false;
        submitBtn.innerText = '🔥 提交答案 · 答对跳转 🔥';
        clearFeedback();
        renderCurrent();
        updateProgress();
        modal.classList.remove('active');
    }
    function onFilterChange() {
        currentGrade = parseInt(gradeSelect.value);
        currentCategory = categorySelect.value;
        refreshList();
    }
    gradeSelect.addEventListener('change', onFilterChange);
    categorySelect.addEventListener('change', onFilterChange);
    prevBtn.addEventListener('click', prevQuestion);
    resetBtn.addEventListener('click', resetCategory);
    submitBtn.addEventListener('click', handleSubmit);
    closeModal.addEventListener('click', () => modal.classList.remove('active'));
    
    initAudio();
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('grade')) gradeSelect.value = urlParams.get('grade');
    if(urlParams.has('category')) categorySelect.value = urlParams.get('category');
    onFilterChange();
</script>
